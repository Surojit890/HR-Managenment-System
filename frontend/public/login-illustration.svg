<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#grad)" rx="32"/>

  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.18">
    <ellipse cx="150" cy="180" rx="90" ry="45"/>
    <ellipse cx="240" cy="160" rx="70" ry="40"/>
    <ellipse cx="100" cy="200" rx="60" ry="35"/>

    <ellipse cx="680" cy="120" rx="100" ry="50"/>
    <ellipse cx="600" cy="140" rx="70" ry="40"/>
    <ellipse cx="740" cy="150" rx="60" ry="35"/>

    <ellipse cx="120" cy="680" rx="110" ry="55"/>
    <ellipse cx="220" cy="650" rx="80" ry="45"/>
    <ellipse cx="60" cy="660" rx="70" ry="40"/>

    <ellipse cx="650" cy="720" rx="100" ry="50"/>
    <ellipse cx="750" cy="690" rx="75" ry="42"/>
  </g>

  <!-- Phone frame -->
  <rect x="310" y="170" width="260" height="460" rx="36" fill="#1e1b4b" stroke="#312e81" stroke-width="8"/>
  <rect x="330" y="190" width="220" height="400" rx="24" fill="#f5f3ff"/>

  <!-- Screen notch area -->
  <circle cx="440" cy="210" r="4" fill="#312e81"/>
  <rect x="410" y="208" width="20" height="4" rx="2" fill="#312e81"/>

  <!-- Fingerprint rings -->
  <circle cx="440" cy="380" r="90" stroke="#8b5cf6" stroke-width="4" opacity="0.25"/>
  <circle cx="440" cy="380" r="72" stroke="#8b5cf6" stroke-width="5" opacity="0.35"/>
  <circle cx="440" cy="380" r="54" stroke="#8b5cf6" stroke-width="6" opacity="0.5"/>

  <!-- Fingerprint lines -->
  <path d="M440 310 v40 M415 335 q-10 45 0 90 M465 335 q10 45 0 90 M390 360 q-20 20 0 80 M490 360 q20 20 0 80" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>

  <!-- Progress bar -->
  <rect x="370" y="510" width="140" height="12" rx="6" fill="#ddd6fe"/>
  <rect x="370" y="510" width="92" height="12" rx="6" fill="#8b5cf6"/>

  <!-- Text hint -->
  <text x="440" y="545" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">
    Place your finger
  </text>
  <text x="440" y="565" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">
    on your phone
  </text>

  <!-- Lock icon -->
  <g transform="translate(580 420)">
    <rect x="20" y="60" width="80" height="80" rx="16" fill="#ffffff" stroke="#1e1b4b" stroke-width="6"/>
    <path d="M40 60 V40 a20 20 0 0 1 40 0 v20" stroke="#ffffff" stroke-width="10"/>
    <path d="M35 60 V40 a25 25 0 0 1 50 0 v20" stroke="#1e1b4b" stroke-width="6" fill="none"/>
    <circle cx="60" cy="100" r="10" fill="#1e1b4b"/>
  </g>

  <!-- Person -->
  <g transform="translate(120 360)">
    <!-- Body -->
    <path d="M80 250 L30 380 L110 380 Z" fill="#f59e0b"/>
    <rect x="45" y="270" width="20" height="110" fill="#ffffff"/>
    <rect x="75" y="270" width="20" height="110" fill="#ffffff"/>
    <!-- Arm reaching to phone -->
    <path d="M85 285 Q170 230 240 180" stroke="#f59e0b" stroke-width="22" stroke-linecap="round" fill="none"/>
    <!-- Head -->
    <circle cx="80" cy="220" r="32" fill="#fde68a"/>
    <path d="M60 205 Q80 185 100 205" stroke="#1e1b4b" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Legs -->
    <path d="M55 380 L45 430" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M95 380 L120 430" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="40" cy="435" rx="18" ry="10" fill="#1e293b"/>
    <ellipse cx="130" cy="435" rx="18" ry="10" fill="#1e293b"/>
    <!-- Bag -->
    <rect x="20" y="290" width="35" height="55" rx="8" fill="#334155"/>
    <path d="M25 290 V270 a10 10 0 0 1 20 0 v20" stroke="#334155" stroke-width="6" fill="none"/>
  </g>

  <!-- Success bubble -->
  <g transform="translate(520 220)">
    <ellipse cx="50" cy="45" rx="60" ry="45" fill="#ffffff"/>
    <path d="M35 70 L25 95 L55 75" fill="#ffffff"/>
    <circle cx="50" cy="45" r="22" fill="#22c55e"/>
    <polyline points="40 45 47 52 63 36" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
