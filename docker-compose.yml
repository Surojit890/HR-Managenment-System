services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: hrms_mail
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    restart: unless-stopped
    depends_on:
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://postgres.[PROJECT_REF]:[PASSWORD]@aws-1-[REGION].pooler.supabase.com:5432/postgres"
      JWT_SECRET: "hrms_dev_secret_key_2026"
      JWT_REFRESH_SECRET: "hrms_dev_refresh_secret_2026"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      FRONTEND_URL: "http://localhost:3000"
      PORT: "3001"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@hrms.com"
      APP_NAME: "HRMS"
      CLOUDINARY_URL: "cloudinary://[API_KEY]:[API_SECRET]@[CLOUD_NAME]"
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      API_URL: "http://backend:3001"
    ports:
      - "3000:3000"
