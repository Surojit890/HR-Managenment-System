services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hrms_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: hrms_mail
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/hrms_db"
      JWT_SECRET: "hrms_dev_secret_key_2026"
      JWT_REFRESH_SECRET: "hrms_dev_refresh_secret_2026"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      FRONTEND_URL: "http://localhost:3000"
      PORT: "3001"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@hrms.com"
      APP_NAME: "HRMS"
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
      API_URL: "http://backend:3001"
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
